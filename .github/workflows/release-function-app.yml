name: Release Function App

on:
  push:
    paths:
      - 'function-app/VERSION'
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force a release even if VERSION unchanged'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Read version
        id: version
        run: |
          VERSION=$(cat function-app/VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify ARM template pins to this tag
        if: steps.check_release.outputs.exists == 'false' || github.event.inputs.force_release == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          EXPECTED="releases/download/${TAG}/s247-function-app.zip"
          if ! grep -q "$EXPECTED" setup/azuredeploy.json; then
            echo "::error::setup/azuredeploy.json functionZipUrl must be pinned to ${EXPECTED}"
            grep functionZipUrl setup/azuredeploy.json
            exit 1
          fi
          echo "functionZipUrl OK: pinned to ${TAG}"

      - name: Build function app zip
        if: steps.check_release.outputs.exists == 'false' || github.event.inputs.force_release == 'true'
        run: |
          cd function-app
          # Pre-install pip dependencies into .python_packages so that the zip is
          # self-contained and can be deployed via WEBSITE_RUN_FROM_PACKAGE.
          # Force manylinux2014 (glibc 2.17) wheels so binaries run on the Azure
          # Functions Linux Consumption worker (Debian 11 / glibc 2.31), not on
          # the GH runner's glibc. Without --platform we get manylinux_2_34
          # wheels that fail with "GLIBC_2.33 not found".
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            --platform manylinux2014_x86_64 \
            --python-version 3.11 \
            --implementation cp \
            --only-binary=:all: \
            --target=".python_packages/lib/site-packages" \
            --no-compile \
            --upgrade \
            -r requirements.txt
          zip -r ../s247-function-app.zip . \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x ".venv/*" \
            -x ".pytest_cache/*" \
            -x "tests/*" \
            -x "local.settings.json" \
            -x "requirements-dev.txt"
          cd ..
          echo "Zip size: $(du -h s247-function-app.zip | cut -f1)"
          echo "Contents:"
          unzip -l s247-function-app.zip | tail -5

      - name: Generate version.json
        if: steps.check_release.outputs.exists == 'false' || github.event.inputs.force_release == 'true'
        run: |
          REPO="${{ github.repository }}"
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          # Digest the exact zip we are about to publish so the AutoUpdater can
          # verify package integrity before deploying it (anti-tamper).
          SHA256="$(sha256sum s247-function-app.zip | cut -d' ' -f1)"
          cat > version.json <<EOF
          {
            "version": "${VERSION}",
            "package_url": "https://github.com/${REPO}/releases/download/${TAG}/s247-function-app.zip",
            "sha256": "${SHA256}",
            "release_notes": "Auto-release of function app version ${VERSION}"
          }
          EOF
          cat version.json

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false' || github.event.inputs.force_release == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Delete existing release if force
          if [ "${{ github.event.inputs.force_release }}" = "true" ]; then
            gh release delete "$TAG" --yes 2>/dev/null || true
            git push --delete origin "$TAG" 2>/dev/null || true
          fi

          gh release create "$TAG" \
            --title "Function App $VERSION" \
            --notes "Auto-release of Site24x7 Diagnostic Logs Function App version $VERSION" \
            --target "${{ github.sha }}" \
            $(echo "$VERSION" | grep -qE 'alpha|beta|rc' && echo --prerelease) \
            s247-function-app.zip \
            version.json \
            setup/azuredeploy.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag:** ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Zip:** s247-function-app.zip" >> "$GITHUB_STEP_SUMMARY"
          echo "- **version.json URL:** https://github.com/${{ github.repository }}/releases/latest/download/version.json" >> "$GITHUB_STEP_SUMMARY"
